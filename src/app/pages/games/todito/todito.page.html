
<div class="app-background">

  <div class="player-container">
<!-- PLAYERS -->
    <div class="players-row">

      <div
        #playerCard

        class="player-card"
        *ngFor="let player of game.players; let i = index"
        [class.active]="i === currentIndex"
      >

        <div class="avatar">

          <img
            *ngIf="player.photo"
            [src]="player.photo"
          />

          <ion-icon
            *ngIf="!player.photo"
            name="person-outline">
          </ion-icon>

        </div>

        <span>
          {{ player.name }}
        </span>

      </div>

    </div>
  </div>

  <div class="todito-container">

    

    <!-- TURNO -->
    <div class="turn-container">

      <h3>Turno de</h3>

      <h1>
        {{ currentPlayer.name }}
      </h1>

    </div>

    <!-- DADO -->
    <div
  class="dice-container"
  (click)="rollDice()"
>

  <div
    class="dice"
    [class.rolling]="isRolling"
    [attr.data-face]="dice || 1"
  >

    <div class="face front">
      <span class="dot center"></span>
    </div>

    <div class="face back">
      <span class="dot top-left"></span>
      <span class="dot top-right"></span>
      <span class="dot middle-left"></span>
      <span class="dot middle-right"></span>
      <span class="dot bottom-left"></span>
      <span class="dot bottom-right"></span>
    </div>

    <div class="face right">
      <span class="dot top-left"></span>
      <span class="dot center"></span>
      <span class="dot bottom-right"></span>
    </div>

    <div class="face left">
      <span class="dot top-left"></span>
      <span class="dot top-right"></span>
      <span class="dot bottom-left"></span>
      <span class="dot bottom-right"></span>
    </div>

    <div class="face top">
      <span class="dot top-left"></span>
      <span class="dot top-right"></span>
      <span class="dot center"></span>
      <span class="dot bottom-left"></span>
      <span class="dot bottom-right"></span>
    </div>

    <div class="face bottom">
      <span class="dot top-left"></span>
      <span class="dot top-right"></span>
      <span class="dot middle-left"></span>
      <span class="dot middle-right"></span>
      <span class="dot bottom-left"></span>
      <span class="dot bottom-right"></span>
    </div>

  </div>

</div>

    <!-- RESULT -->
    <div
      class="result-card"
      *ngIf="resultText"
    >

      <h2>
        {{ resultText }}
      </h2>

      <!-- TYPES -->
      <div class="punishment-types">

        <button
          *ngFor="let type of punismentTypes"
          class="type-btn"
          (click)="selectPunishmentType(type.type)"
        >

          <ion-icon [name]="type.icon"></ion-icon>

          <span>
            {{ type.label }}
          </span>

        </button>

      </div>

    </div>

  </div>

  <app-punishment-modal
  [isOpen]="showPunishmentModal"
  [punishment]="selectedPunishment"
  [players]="game.players"
  [currentPlayer]="currentPlayer"
  (completed)="confirmarSalida()"
  (closed)="showPunishmentModal = false"
>
</app-punishment-modal>

</div>
